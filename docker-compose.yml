services:
  mysql:
    image: mysql:8.0
    container_name: property_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: property_chatbot
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/001_property_chatbot_schema.sql:/docker-entrypoint-initdb.d/001_property_chatbot_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.11.5
    container_name: property_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: property_api
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_started
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: property_chatbot
      DATA_DIR: /data
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: property_website_chunks
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./RentRoll_LeaseCharges_NamesRedacted:/data:ro

volumes:
  mysql_data:
  qdrant_data:
