<!doctype html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Property Copilot</title><link rel="stylesheet" href="/static/styles.css" /><script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head><body><div class="app-shell"><aside class="left-rail"><div class="brand">Property Copilot</div><div class="sub">Scoped AI for operations</div><div class="controls"><label>Property Code</label><input id="propertyCode" value="115R" /><label>Model</label><select id="modelSelect"></select></div></aside><main class="chat-pane"><header class="chat-header"><h1>Property Assistant</h1><p>Ask anything about one property at a time.</p></header><section id="messages" class="messages"></section><form id="composer" class="composer"><textarea id="question" placeholder="Ask about occupancy, vacancies, rent, lease expirations, or website highlights..." rows="2"></textarea><button type="submit" id="sendBtn">Send</button></form></main></div><script src="/static/app.js"></script></body></html>
